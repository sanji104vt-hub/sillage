<article>
  <p class="crumb"><a href="/">Sillage</a> ／ お問い合わせ</p>
  <h1>お問い合わせ</h1>
  <p class="lead">掲載情報の修正依頼、取材、業務のご相談などは以下のフォームからお送りください。3〜5日以内に返信いたします（土日祝を除く）。</p>

  <!--
    USER SETUP REQUIRED:
    以下 form の action= を、実際のFormspreeエンドポイントに差し替えてください。
    1. https://formspree.io にアカウント登録
    2. 新しいフォームを作成 → 発行される "https://formspree.io/f/xxxxxxxx" の xxxxxxxx を控える
    3. 下の action="https://formspree.io/f/YOUR_FORMSPREE_ID" を差し替える
    4. 初回送信を自分で行い、送信先メールを承認する
    未設定の状態でも表示に問題は出ませんが、送信は届きません。
  -->
  <div class="notice">現在お問い合わせフォームは準備中です。設定完了までは送信が届かない場合がありますので、ご了承ください。</div>

  <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
    <label for="name">お名前 <span style="color:#c4889c">*</span></label>
    <input type="text" id="name" name="name" required autocomplete="name">

    <label for="email">メールアドレス <span style="color:#c4889c">*</span></label>
    <input type="email" id="email" name="email" required autocomplete="email">

    <label for="subject">件名の種類</label>
    <select id="subject" name="subject">
      <option>掲載情報の修正依頼</option>
      <option>取材・掲載依頼</option>
      <option>広告・タイアップ</option>
      <option>その他</option>
    </select>

    <label for="message">お問い合わせ内容 <span style="color:#c4889c">*</span></label>
    <textarea id="message" name="message" required placeholder="ご用件をお書きください"></textarea>

    <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
    <button type="submit">送信する</button>
    <p class="hint">送信内容は送信者への返信目的のみに使用します。詳細は <a href="/privacy.html" style="color:#aeb0b6">プライバシーポリシー</a> をご覧ください。</p>
  </form>

  <a class="backhome" href="/">← Sillage トップへ</a>
</article>
